<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="arcadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- Screen background -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Arcade border -->
  <rect width="400" height="300" fill="none" stroke="#ff006e" stroke-width="4"/>
  <!-- Grid pattern -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.2">
    <line x1="0" y1="0" x2="400" y2="300"/>
    <line x1="400" y1="0" x2="0" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
  </g>
  <!-- Center circle -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <!-- Text -->
  <text x="200" y="140" font-family="Courier New" font-size="24" fill="#ff006e" text-anchor="middle" font-weight="bold">ARCADE</text>
  <text x="200" y="170" font-family="Courier New" font-size="16" fill="#00ff88" text-anchor="middle">PROJECT</text>
</svg>