<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Oliver Aldred</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">OA.</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>► SEND MESSAGE TO PLAYER ◄</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 3rem; font-size: 1.1em;">
                WIP
            </p>

            <div class="contact-container">
                <div class="contact-info">
                    <div class="contact-item">
                        <h3>Email</h3>
                        <p>
                            <a href="mailto:oliver.aldred08@Gmail.com">oliver.aldred08@Gmail.com</a>
                        </p>
                    </div>
                    <div class="contact-item">
                        <h3>Phone</h3>
                        <p>
                            <a href="tel:+447368544271">+44 7368 544271</a>
                        </p>
                    </div>
                    <div class="contact-item">
                        <h3>Location</h3>
                        <p>Bristol, UK</p>
                    </div>
                </div>

                <form class="contact-form" style="background: rgba(45, 45, 68, 0.5); padding: 2rem; border-radius: 10px; border: 1px solid var(--border-color);">
                    <div class="form-group">
                        <label for="name">WIP *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">WIP *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">WIP *</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>

                    <button type="submit" class="cta-button" style="width: 100%;">Send Message</button>
                </form>

                <div style="margin-top: 3rem; padding: 2rem; background: rgba(255, 0, 110, 0.05); border: 2px solid var(--accent-pink); border-radius: 3px;">
                    <h3 style="color: var(--accent-cyan); margin-bottom: 1rem; text-shadow: 0 0 8px var(--accent-cyan);">► Extra Information ◄</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                        
                    </p>
                    <div class="social-links" style="justify-content: flex-start;">
                        <a href="https://github.com/OliverAldred-dev" target="_blank" title="GitHub">GitHub</a>
                        <a href="https://www.linkedin.com/in/oliver-aldred-9691023b7/" target="_blank" title="LinkedIn">LinkedIn</a>
                        <a href="mailto:oliver.aldred08@gmail.com" target="_blank" title="Gmail">Gmail</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="#" title="GitHub"><img src="images/Github.png" alt="GitHub" class="social-icon"></a>
                <a href="#" title="LinkedIn"><img src="images/LinkedIn.png" alt="LinkedIn" class="social-icon"></a>
                <a href="#" title="Email"><img src="images/Gmail.png" alt="Email" class="social-icon"></a>
            </div>
            <p class="footer-text">© 2026 Oliver Aldred. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
